<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Soft solar glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Background field: deep charcoal with a faint warm core -->
    <radialGradient id="bgCore" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#1a140b"/>
      <stop offset="55%" stop-color="#0d0b08"/>
      <stop offset="100%" stop-color="#070605"/>
    </radialGradient>

    <!-- Solar title gradient: ember to gold -->
    <linearGradient id="solarText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd27a"/>
      <stop offset="50%" stop-color="#ffab2e"/>
      <stop offset="100%" stop-color="#e9711c"/>
    </linearGradient>

    <!-- Horizontal hairline gradient -->
    <linearGradient id="ruleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffab2e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffab2e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffab2e" stop-opacity="0"/>
    </linearGradient>

    <!-- Corona ring fade -->
    <radialGradient id="corona" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffab2e" stop-opacity="0"/>
      <stop offset="70%" stop-color="#ffab2e" stop-opacity="0"/>
      <stop offset="88%" stop-color="#ffab2e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffab2e" stop-opacity="0"/>
    </radialGradient>

    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </radialGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#ffab2e" stroke-width="0.4"/>
    </pattern>
    <pattern id="scanlines" width="3" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="3" y2="0" stroke="#ffab2e" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base -->
  <rect width="1200" height="300" fill="url(#bgCore)"/>
  <rect width="1200" height="300" fill="url(#grid)" opacity="0.10"/>

  <!-- Central corona / solar disc behind the title -->
  <circle cx="600" cy="130" r="150" fill="url(#corona)" filter="url(#strongGlow)" opacity="0.8"/>
  <ellipse cx="600" cy="135" rx="430" ry="120" fill="#ffab2e" opacity="0.04" filter="url(#strongGlow)"/>

  <!-- Left ray / data field -->
  <g font-family="monospace" font-size="11" fill="#ffab2e" opacity="0.30">
    <text x="48" y="58">01101001</text>
    <text x="48" y="80">SOLAR</text>
    <text x="48" y="102">FLUX</text>
    <text x="48" y="124">10010110</text>
    <text x="120" y="70">kWh</text>
    <text x="120" y="92">ROOF</text>
    <text x="120" y="114">GRID</text>
  </g>

  <!-- Right ray / data field -->
  <g font-family="monospace" font-size="11" fill="#ffab2e" opacity="0.30" text-anchor="end">
    <text x="1152" y="58">PHOTON</text>
    <text x="1152" y="80">11001010</text>
    <text x="1152" y="102">YIELD</text>
    <text x="1152" y="124">00111001</text>
    <text x="1080" y="70">ARRAY</text>
    <text x="1080" y="92">INVERT</text>
    <text x="1080" y="114">STORE</text>
  </g>

  <!-- Symmetric ray lines emanating from the disc -->
  <g stroke="#ffab2e" stroke-width="1" opacity="0.22" filter="url(#glow)">
    <line x1="600" y1="130" x2="300" y2="48"/>
    <line x1="600" y1="130" x2="240" y2="130"/>
    <line x1="600" y1="130" x2="300" y2="212"/>
    <line x1="600" y1="130" x2="900" y2="48"/>
    <line x1="600" y1="130" x2="960" y2="130"/>
    <line x1="600" y1="130" x2="900" y2="212"/>
  </g>
  <g fill="#ffd27a" opacity="0.55" filter="url(#glow)">
    <circle cx="300" cy="48" r="2.5"/>
    <circle cx="240" cy="130" r="2.5"/>
    <circle cx="300" cy="212" r="2.5"/>
    <circle cx="900" cy="48" r="2.5"/>
    <circle cx="960" cy="130" r="2.5"/>
    <circle cx="900" cy="212" r="2.5"/>
  </g>

  <!-- Main title: erosolar -->
  <g filter="url(#strongGlow)">
    <text x="600" y="150" font-family="'Courier New', monospace" font-size="92" font-weight="bold"
          fill="url(#solarText)" text-anchor="middle" letter-spacing="6">erosolar</text>
  </g>

  <!-- Hairline rule under the title -->
  <rect x="350" y="178" width="500" height="1.5" fill="url(#ruleGrad)"/>

  <!-- Dedication subtitle -->
  <text x="600" y="208" font-family="'Courier New', monospace" font-size="18"
        fill="#ffd27a" text-anchor="middle" opacity="0.92" letter-spacing="2">
    for Erosolar &#8212; every generation, stronger because of you
  </text>

  <!-- Terminal-style coordinate line -->
  <text x="600" y="240" font-family="monospace" font-size="12.5"
        fill="#e9711c" text-anchor="middle" opacity="0.7" letter-spacing="1">
    ~/erosolar $ harvest --sun --persist  // captured 2026
  </text>

  <!-- Bottom progress / horizon bar -->
  <g opacity="0.55">
    <rect x="350" y="262" width="500" height="3" rx="1.5" fill="#241a0e"/>
    <rect x="350" y="262" width="372" height="3" rx="1.5" fill="#ffab2e" filter="url(#glow)"/>
    <circle cx="722" cy="263.5" r="3.5" fill="#ffd27a" filter="url(#glow)"/>
  </g>

  <!-- Corner brackets -->
  <g stroke="#ffab2e" stroke-width="2" fill="none" opacity="0.5" filter="url(#glow)">
    <path d="M28 56 L28 28 L56 28"/>
    <path d="M1144 28 L1172 28 L1172 56"/>
    <path d="M28 244 L28 272 L56 272"/>
    <path d="M1144 272 L1172 272 L1172 244"/>
  </g>

  <!-- Scanlines + vignette -->
  <rect width="1200" height="300" fill="url(#scanlines)" opacity="0.03"/>
  <rect width="1200" height="300" fill="url(#vignette)"/>
</svg>
