# model-landscape — the set of frontier models tracked by update.py.
#
# This manifest is the single source of truth for WHICH models the agentic
# updater profiles. Edit it to add/remove models, then run:
#
#   python model-landscape/update.py            # refresh every model
#   python model-landscape/update.py --only gpt-5.5 grok-4.3
#   python model-landscape/update.py --dry-run  # show plan, write nothing
#
# `slug` becomes models/<slug>.md. `aliases` widen the web search.
models:
  - slug: claude-opus-4.8
    name: "Claude Opus 4.8"
    vendor: "Anthropic"
    family: "Claude 4.x"
    aliases: ["claude-opus-4-8", "Opus 4.8", "Anthropic Opus 4.8"]

  - slug: claude-fable-5
