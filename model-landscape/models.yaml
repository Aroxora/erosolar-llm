    vendor: "Anthropic"
    family: "Fable"
    aliases: ["claude-fable-5", "Fable 5", "Anthropic Fable"]

  - slug: claude-mythos-5
    name: "Claude Mythos 5"
    vendor: "Anthropic"
    family: "Mythos"
    aliases: ["Mythos 5", "Anthropic Mythos"]

  - slug: gpt-5.5
    name: "GPT-5.5"
    vendor: "OpenAI"
    family: "GPT-5"
    aliases: ["GPT 5.5", "OpenAI GPT-5.5", "gpt-5.5"]

  - slug: gemini-3.1-pro
    name: "Gemini 3.1 Pro"
    vendor: "Google DeepMind"
    family: "Gemini 3"
    aliases: ["Gemini 3.1 Pro", "Google Gemini 3.1"]

  - slug: gemini-4.5-flash
