name: DeepSeekerChat
options:
  # Primary bundle prefix chosen for alignment with recommended domain erosolarai.com
  # Main app bundle: com.erosolarai.chat (tests: .chat.tests)
  # See DOMAINS.md for exact App Store Connect steps to lock the ID + name "Erosolar".
  bundleIdPrefix: com.erosolarai
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"

targets:
  DeepSeekerChat:
    type: application
    platform: iOS
    sources:
      - DeepSeekerChat
    resources:
      - path: DeepSeekerChat/Model
        buildPhase: resources
        type: folder
      - path: DeepSeekerChat/vocab.json
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: DeepSeekerChat/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.erosolarai.chat
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "YES"
        # Associated domains entitlements for universal links + webcredentials
        # once domains (erosoralai.com, erosoral.com) are purchased and live.
        # See DOMAINS.md and the Erosoral.entitlements file (created in this pass).
        CODE_SIGN_ENTITLEMENTS: DeepSeekerChat/Erosoral.entitlements
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseCore
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseAuth

  DeepSeekerChatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - DeepSeekerChatTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.erosolarai.chat.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: "YES"
    dependencies:
      - target: DeepSeekerChat
      - package: firebase-ios-sdk
        product: FirebaseCore
      - package: firebase-ios-sdk
        product: FirebaseFirestore

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    majorVersion: 11.0.0
