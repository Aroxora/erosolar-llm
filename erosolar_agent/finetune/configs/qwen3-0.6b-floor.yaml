# FLOOR config — Qwen3-0.6B, the smallest model that is BOTH Apache-2.0 AND a
# confirmed genuinely general-purpose assistant (the honest floor; see /pipeline).
# Cheapest possible dial-in: QLoRA fits a free Colab/Kaggle T4 (16 GB) with room
# to spare (~2-3 GB est.). Use this to validate data/loss/format before climbing
# the ladder (1.7B -> 4B -> 8B proto -> 14B -> 30B-A3B MoE -> 32B final).
stage: sft
base_model: unsloth/Qwen3-0.6B   # POST-TRAINED (instruct) Qwen3, not -Base
load_in_4bit: true
max_seq_length: 4096
lora_r: 16
lora_alpha: 16
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
use_gradient_checkpointing: unsloth

dataset_path: data/sft_blend.train.jsonl
eval_path: data/sft_blend.eval.jsonl
train_on_responses_only: true

output_dir: outputs/qwen3-0.6b-floor-sft
num_train_epochs: 1
max_steps: 300             # minutes on any modern GPU; set -1 for a full epoch
per_device_train_batch_size: 16
gradient_accumulation_steps: 1
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
save_steps: 200
seed: 3407
run_name: qwen3-0.6b-floor-sft
report_to: none
