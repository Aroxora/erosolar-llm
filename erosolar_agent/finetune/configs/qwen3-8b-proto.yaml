# PROTOTYPE config — dial the recipe cheaply on Qwen3-8B before the 32B run.
# A short pass to confirm data/loss/format are sane (raise max_steps for a real proto).
stage: sft
base_model: unsloth/Qwen3-8B
max_seq_length: 4096
lora_r: 16
lora_alpha: 16
target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]

dataset_path: data/sft_blend.train.jsonl
eval_path: data/sft_blend.eval.jsonl
train_on_responses_only: true

output_dir: outputs/qwen3-8b-proto-sft
num_train_epochs: 1
max_steps: 400              # ~30-45 min on one H100; set -1 for a full epoch
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 2.0e-4
lr_scheduler_type: cosine
warmup_ratio: 0.03
save_steps: 200
seed: 3407
run_name: qwen3-8b-proto-sft
report_to: none
