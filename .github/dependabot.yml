# Grouped, minor/patch-only Dependabot config (managed by erosolar tooling).
# Major version bumps are ignored to avoid build-breaking PR noise;
# security updates still flow regardless of these ignore rules.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/angular-chat"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      npm-angular-chat:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "npm"
    directory: "/firebase_functions"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      npm-firebase-functions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "pip"
    directory: "/"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      pip:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "pip"
    directory: "/functions_python"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      pip-functions-python:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "docker"
    directory: "/"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "docker"
    directory: "/angular-chat"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      docker-angular-chat:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
